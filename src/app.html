<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Giuseppe Bellamacina — AI Engineer specialised in LLM-based systems, multi-agent architectures, and Deep Learning models. Working on AI deployments for healthcare and defence organisations."
		/>
		<title>Giuseppe Bellamacina | AI Engineer & Developer</title>
		<link rel="canonical" href="https://giuseppebellamacina.com/" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
		<link
			rel="icon"
			type="image/png"
			sizes="48x48"
			href="%sveltekit.assets%/favicons/favicon-48x48.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="96x96"
			href="%sveltekit.assets%/favicons/favicon-96x96.png"
		/>
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicons/favicon.svg" />
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="%sveltekit.assets%/favicons/apple-touch-icon.png"
		/>
		<meta name="theme-color" content="#000000" />
		<!-- Google Fonts: Outfit (headings) + Sora (body) — non-render-blocking -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="preload"
			as="style"
			href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Sora:wght@400;600;700&display=swap"
			onload="
				this.onload = null;
				this.rel = 'stylesheet';
			"
		/>
		<noscript>
			<link
				rel="stylesheet"
				href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Sora:wght@400;600;700&display=swap"
			/>
		</noscript>
		<!-- Preconnect BEFORE using the CDN -->
		<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
		<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />
		<!-- Font Awesome: async load to avoid render-blocking -->
		<link
			rel="preload"
			as="style"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
			onload="
				this.onload = null;
				this.rel = 'stylesheet';
			"
		/>
		<noscript>
			<link
				rel="stylesheet"
				href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
			/>
		</noscript>
		<!-- Preload hero image (desktop only — on mobile it's smaller priority) -->
		<link
			rel="preload"
			href="https://giuseppebellamacina.com/assets/profile.avif"
			as="image"
			type="image/avif"
			fetchpriority="high"
			media="(min-width: 769px)"
		/>
		<link rel="manifest" href="https://giuseppebellamacina.com/site.webmanifest" />
		<meta property="og:title" content="Giuseppe Bellamacina | AI Engineer & Developer" />
		<meta property="og:site_name" content="Giuseppe Bellamacina" />
		<meta
			property="og:description"
			content="Giuseppe Bellamacina — AI Engineer specialised in LLM-based systems, multi-agent architectures, and Deep Learning models. Working on AI deployments for healthcare and defence organisations."
		/>
		<meta property="og:image" content="https://giuseppebellamacina.com/assets/profile.png" />
		<meta property="og:type" content="website" />
		<meta name="twitter:card" content="summary_large_image" />
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "WebSite",
				"name": "Giuseppe Bellamacina",
				"url": "https://giuseppebellamacina.com/"
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
