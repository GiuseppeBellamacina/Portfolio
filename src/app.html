<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Giuseppe Bellamacina — AI Engineer & Software Developer specializzato in Intelligenza Artificiale, Machine Learning e Deep Learning."
		/>
		<title>Giuseppe Bellamacina - Portfolio</title>
		<link rel="icon" href="/favicon.ico" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<!-- Preconnect BEFORE using the CDN -->
		<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
		<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />
		<!-- Font Awesome: async load to avoid render-blocking -->
		<link
			rel="preload"
			as="style"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
			onload="
				this.onload = null;
				this.rel = 'stylesheet';
			"
		/>
		<noscript>
			<link
				rel="stylesheet"
				href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
			/>
		</noscript>
		<!-- Force font-display: swap on FA fonts -->
		<style>
			@font-face {
				font-family: 'Font Awesome 6 Free';
				font-display: swap;
			}
			@font-face {
				font-family: 'Font Awesome 6 Brands';
				font-display: swap;
			}
		</style>
		<!-- Preload optimized hero image -->
		<link
			rel="preload"
			href="/assets/profile.avif"
			as="image"
			type="image/avif"
			fetchpriority="high"
		/>
		<link rel="preload" href="/assets/profile.webp" as="image" type="image/webp" />
		<link rel="manifest" href="/site.webmanifest" />
		<meta property="og:title" content="Giuseppe Bellamacina - Portfolio" />
		<meta property="og:site_name" content="Giuseppe Bellamacina" />
		<meta
			property="og:description"
			content="Giuseppe Bellamacina — AI Engineer & Software Developer specializzato in Intelligenza Artificiale, Machine Learning e Deep Learning."
		/>
		<meta property="og:image" content="/assets/profile.png" />
		<meta property="og:type" content="website" />
		<meta name="twitter:card" content="summary_large_image" />
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "WebSite",
				"name": "Giuseppe Bellamacina",
				"url": "https://giuseppebellamacina.vercel.app"
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
