<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
  </defs>
  <!-- Hexagon background -->
  <polygon points="32,2 58,17 58,47 32,62 6,47 6,17" fill="url(#bg)" stroke="#fff" stroke-width="1.8"/>
  <!-- Inner hexagon trace -->
  <polygon points="32,12 48,21 48,43 32,52 16,43 16,21" fill="none" stroke="#555" stroke-width="0.5"/>
  <!-- Circuit traces from vertices -->
  <line x1="32" y1="2" x2="32" y2="12" stroke="#888" stroke-width="0.6"/>
  <line x1="58" y1="17" x2="48" y2="21" stroke="#888" stroke-width="0.6"/>
  <line x1="58" y1="47" x2="48" y2="43" stroke="#888" stroke-width="0.6"/>
  <line x1="32" y1="62" x2="32" y2="52" stroke="#888" stroke-width="0.6"/>
  <line x1="6" y1="47" x2="16" y2="43" stroke="#888" stroke-width="0.6"/>
  <line x1="6" y1="17" x2="16" y2="21" stroke="#888" stroke-width="0.6"/>
  <!-- Corner dots -->
  <circle cx="32" cy="2" r="1.3" fill="#fff"/>
  <circle cx="58" cy="17" r="1.3" fill="#fff"/>
  <circle cx="58" cy="47" r="1.3" fill="#fff"/>
  <circle cx="32" cy="62" r="1.3" fill="#fff"/>
  <circle cx="6" cy="47" r="1.3" fill="#fff"/>
  <circle cx="6" cy="17" r="1.3" fill="#fff"/>
  <!-- GB Text -->
  <text x="32" y="38" font-family="monospace" font-weight="bold" font-size="17" fill="#fff" text-anchor="middle" letter-spacing="-0.5">GB</text>
</svg>
